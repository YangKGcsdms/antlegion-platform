role: qa-tester

# ── DDD 质量域 ──
# IN  (3/3): prd.published, backend.done, frontend.done
# OUT (2/2): bug.found, quality.approved

claims: []

allowed_publish:
  - bug.found
  - quality.approved

publish_modes:
  - fact_type: bug.found
    mode: exclusive
  - fact_type: quality.approved
    mode: broadcast

context_interests:
  - prd.published
  - backend.done
  - frontend.done

max_concurrent_claims: 2
max_retries: 3
max_tool_rounds: 50
