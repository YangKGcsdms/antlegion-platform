role: product-manager

# ── DDD 需求域 ──
# IN  (2/3): requirement.submitted, quality.approved
# OUT (2/2): prd.published, release.approved

claims:
  - requirement.submitted

allowed_publish:
  - prd.published
  - release.approved

publish_modes:
  - fact_type: prd.published
    mode: broadcast
  - fact_type: release.approved
    mode: broadcast

context_interests:
  - quality.approved

max_concurrent_claims: 1
max_retries: 2
max_tool_rounds: 50
