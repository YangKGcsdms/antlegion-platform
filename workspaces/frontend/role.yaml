role: frontend-developer

# ── DDD 前端实现域 ──
# IN  (3/3): design.published, api.published, bug.found
# OUT (1/2): frontend.done

claims:
  - bug.found

allowed_publish:
  - frontend.done

publish_modes:
  - fact_type: frontend.done
    mode: broadcast

context_interests:
  - design.published
  - api.published

max_concurrent_claims: 2
max_retries: 3
max_tool_rounds: 50
