services:
  # ══════════════════════════════════════════════════════════════════════════════
  # Legion Bus - 事实总线（核心）
  # ══════════════════════════════════════════════════════════════════════════════
  antlegion-bus:
    build: ./antlegion-bus
    container_name: antlegion-bus
    ports:
      - "28080:28080"
    environment:
      - PORT=28080
      - ANTLEGION_DATA_DIR=/data
      - ANTLEGION_BUS_SECRET=${ANTLEGION_BUS_SECRET:-dev-secret}
    volumes:
      - bus-data:/data
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:28080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ══════════════════════════════════════════════════════════════════════════════
  # Legion Bus UI - 可视化仪表盘
  # ══════════════════════════════════════════════════════════════════════════════
  antlegion-bus-ui:
    build: ./antlegion-bus-ui
    container_name: antlegion-ui
    ports:
      - "3000:80"
    environment:
      - VITE_BUS_API_URL=http://localhost:28080
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════════
  # Product Manager Ant - 产品经理（3年经验）
  # ══════════════════════════════════════════════════════════════════════════════
  ant-product:
    build: ./antlegion
    container_name: ant-product
    ports:
      - "9091:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=product-manager
      - ANT_BUS_DESCRIPTION=产品经理：需求分析、PRD编写、任务拆分、验收确认
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=requirement-analysis,prd-writing,task-breakdown,acceptance-criteria
      - ANT_DOMAIN_INTERESTS=product,requirement,feature,user-story
      - ANT_FACT_TYPE_PATTERNS=requirement.*,feature.*,clarification.*,code.backend.completed,code.frontend.completed,api.contract.published,quality.approved,quality.report.published,bug.found,bug.fixed
    volumes:
      - ./workspaces/product:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/docs:/shared/docs
      - ./shared-output/requirements:/shared/requirements
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════════════════════════
  # UI Developer Ant - UI开发（3年经验）
  # ══════════════════════════════════════════════════════════════════════════════
  ant-ui:
    build: ./antlegion
    container_name: ant-ui
    ports:
      - "9095:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=ui-developer
      - ANT_BUS_DESCRIPTION=UI开发：HTML原型、Tailwind CSS、视觉规范、组件标注
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=ui-development,html,tailwindcss,prototype,visual-design
      - ANT_DOMAIN_INTERESTS=ui,design,prototype,visual
      - ANT_FACT_TYPE_PATTERNS=task.ui.*,bug.found,prd.published,api.contract.published,code.frontend.completed
    volumes:
      - ./workspaces/ui:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/code:/shared/code
      - ./shared-output/docs:/shared/docs:ro
      - ./shared-output/requirements:/shared/requirements:ro
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════════════════════════
  # Backend Developer Ant - 后端开发（3年经验）
  # ══════════════════════════════════════════════════════════════════════════════
  ant-backend:
    build: ./antlegion
    container_name: ant-backend
    ports:
      - "9092:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=backend-developer
      - ANT_BUS_DESCRIPTION=后端开发：Node.js/Express API开发、SQLite数据库、业务逻辑
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=backend-development,api-design,database,nodejs,typescript,express
      - ANT_DOMAIN_INTERESTS=backend,api,database,service
      - ANT_FACT_TYPE_PATTERNS=task.backend.*,bug.found,prd.published,api.contract.published,code.frontend.completed
    volumes:
      - ./workspaces/backend:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/code:/shared/code
      - ./shared-output/docs:/shared/docs
      - ./shared-output/requirements:/shared/requirements:ro
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════════════════════════
  # Frontend Developer Ant - 前端开发（3年经验）
  # ══════════════════════════════════════════════════════════════════════════════
  ant-frontend:
    build: ./antlegion
    container_name: ant-frontend
    ports:
      - "9093:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=frontend-developer
      - ANT_BUS_DESCRIPTION=前端开发：React/TypeScript页面开发、Tailwind CSS、API对接
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=frontend-development,ui-component,react,typescript,tailwindcss
      - ANT_DOMAIN_INTERESTS=frontend,ui,component,style
      - ANT_FACT_TYPE_PATTERNS=task.frontend.*,bug.found,prd.published,api.contract.published,code.backend.completed
    volumes:
      - ./workspaces/frontend:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/code:/shared/code
      - ./shared-output/docs:/shared/docs
      - ./shared-output/requirements:/shared/requirements:ro
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════════════════════════
  # QA Tester Ant - 测试工程师（3年经验）
  # ══════════════════════════════════════════════════════════════════════════════
  ant-tester:
    build: ./antlegion
    container_name: ant-tester
    ports:
      - "9094:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=qa-tester
      - ANT_BUS_DESCRIPTION=测试工程师：测试用例设计、API测试脚本、Bug报告、质量验收
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=testing,test-case-design,api-testing,bug-report,quality-assurance
      - ANT_DOMAIN_INTERESTS=test,quality,automation
      - ANT_FACT_TYPE_PATTERNS=task.test.*,bug.verify.*,prd.published,code.backend.completed,code.frontend.completed,api.contract.published,bug.fixed
    volumes:
      - ./workspaces/tester:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/tests:/shared/tests
      - ./shared-output/docs:/shared/docs        # 需要写 quality 报告，不能 ro
      - ./shared-output/requirements:/shared/requirements:ro
      - ./shared-output/code:/shared/code:ro
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ══════════════════════════════════════════════════════════════════════════════
# Networks
# ══════════════════════════════════════════════════════════════════════════════
networks:
  ant-network:
    driver: bridge

# ══════════════════════════════════════════════════════════════════════════════
# Volumes
# ══════════════════════════════════════════════════════════════════════════════
volumes:
  bus-data:
