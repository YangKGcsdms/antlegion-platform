services:
  # ══════════════════════════════════════════════════════════════════════════════
  # Legion Bus - 事实总线（核心）
  # ══════════════════════════════════════════════════════════════════════════════
  antlegion-bus:
    build: ./antlegion-bus
    container_name: antlegion-bus
    ports:
      - "28080:28080"
    environment:
      - PORT=28080
      - ANTLEGION_DATA_DIR=/data
      - ANTLEGION_BUS_SECRET=${ANTLEGION_BUS_SECRET:-dev-secret}
    volumes:
      - bus-data:/data
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:28080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ══════════════════════════════════════════════════════════════════════════════
  # Legion Bus UI - 可视化仪表盘
  # ══════════════════════════════════════════════════════════════════════════════
  antlegion-bus-ui:
    build: ./antlegion-bus-ui
    container_name: antlegion-ui
    ports:
      - "3000:80"
    environment:
      - VITE_BUS_API_URL=http://localhost:28080
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════════
  # Product Manager Ant - 产品经理 · 需求域 (DDD)
  # ══════════════════════════════════════════════════════════════════════════════
  ant-product:
    build: ./antlegion
    container_name: ant-product
    ports:
      - "9091:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=product-manager
      - ANT_BUS_DESCRIPTION=产品经理（需求域）：需求分析、PRD编写、验收发布
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=requirement-analysis,prd-writing,acceptance-criteria
      - ANT_DOMAIN_INTERESTS=product,requirement
      - ANT_FACT_TYPE_PATTERNS=requirement.submitted,quality.approved
    volumes:
      - ./workspaces/product:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/docs:/shared/docs
      - ./shared-output/requirements:/shared/requirements
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════════════════════════
  # UI Designer Ant - UI设计师 · 设计域 (DDD)
  # ══════════════════════════════════════════════════════════════════════════════
  ant-ui:
    build: ./antlegion
    container_name: ant-ui
    ports:
      - "9095:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=ui-designer
      - ANT_BUS_DESCRIPTION=UI设计师（设计域）：HTML原型、Tailwind CSS、视觉规范、组件标注
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=ui-design,html,tailwindcss,prototype,visual-design
      - ANT_DOMAIN_INTERESTS=ui,design
      - ANT_FACT_TYPE_PATTERNS=prd.published
    volumes:
      - ./workspaces/ui:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/code:/shared/code
      - ./shared-output/docs:/shared/docs:ro
      - ./shared-output/requirements:/shared/requirements:ro
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════════════════════════
  # Backend Developer Ant - 后端开发 · 后端实现域 (DDD)
  # ══════════════════════════════════════════════════════════════════════════════
  ant-backend:
    build: ./antlegion
    container_name: ant-backend
    ports:
      - "9092:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=backend-developer
      - ANT_BUS_DESCRIPTION=后端开发（后端实现域）：Node.js/Express API开发、SQLite数据库
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=backend-development,api-design,database,nodejs,typescript,express
      - ANT_DOMAIN_INTERESTS=backend,api
      - ANT_FACT_TYPE_PATTERNS=prd.published,design.published,bug.found
    volumes:
      - ./workspaces/backend:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/code:/shared/code
      - ./shared-output/docs:/shared/docs
      - ./shared-output/requirements:/shared/requirements:ro
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════════════════════════
  # Frontend Developer Ant - 前端开发 · 前端实现域 (DDD)
  # ══════════════════════════════════════════════════════════════════════════════
  ant-frontend:
    build: ./antlegion
    container_name: ant-frontend
    ports:
      - "9093:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=frontend-developer
      - ANT_BUS_DESCRIPTION=前端开发（前端实现域）：React/TypeScript页面开发、API对接
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=frontend-development,react,typescript,tailwindcss
      - ANT_DOMAIN_INTERESTS=frontend,ui
      - ANT_FACT_TYPE_PATTERNS=design.published,api.published,bug.found
    volumes:
      - ./workspaces/frontend:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/code:/shared/code
      - ./shared-output/docs:/shared/docs
      - ./shared-output/requirements:/shared/requirements:ro
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════════════════════════
  # QA Tester Ant - 测试工程师 · 质量域 (DDD)
  # ══════════════════════════════════════════════════════════════════════════════
  ant-tester:
    build: ./antlegion
    container_name: ant-tester
    ports:
      - "9094:9090"
    environment:
      - ANT_BUS_URL=http://antlegion-bus:28080
      - ANT_BUS_NAME=qa-tester
      - ANT_BUS_DESCRIPTION=测试工程师（质量域）：测试用例设计、API测试、Bug报告、质量验收
      - ANT_WORKSPACE=/workspace
      - LLM_PROVIDER_TYPE=${LLM_PROVIDER_TYPE:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANT_CAPABILITY_OFFER=testing,test-case-design,api-testing,bug-report,quality-assurance
      - ANT_DOMAIN_INTERESTS=test,quality
      - ANT_FACT_TYPE_PATTERNS=prd.published,backend.done,frontend.done
    volumes:
      - ./workspaces/tester:/workspace
      - ./knowledge-base:/knowledge-base:ro
      - ./shared-output/tests:/shared/tests
      - ./shared-output/docs:/shared/docs        # 需要写 quality 报告，不能 ro
      - ./shared-output/requirements:/shared/requirements:ro
      - ./shared-output/code:/shared/code:ro
    depends_on:
      antlegion-bus:
        condition: service_healthy
    networks:
      - ant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ══════════════════════════════════════════════════════════════════════════════
# Networks
# ══════════════════════════════════════════════════════════════════════════════
networks:
  ant-network:
    driver: bridge

# ══════════════════════════════════════════════════════════════════════════════
# Volumes
# ══════════════════════════════════════════════════════════════════════════════
volumes:
  bus-data:
