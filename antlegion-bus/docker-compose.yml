version: "3.8"

services:
  bus:
    build: .
    ports:
      - "28080:28080"
    environment:
      - PORT=28080
      - ANTLEGION_DATA_DIR=/data
      - ANTLEGION_BUS_SECRET=${ANTLEGION_BUS_SECRET:-}
    volumes:
      - bus-data:/data
    restart: unless-stopped

  ui:
    build: ../antlegion-bus-ui
    ports:
      - "3000:80"
    depends_on:
      - bus
    restart: unless-stopped

volumes:
  bus-data:
